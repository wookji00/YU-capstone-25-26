<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset="UTF-8">
    <title>YU - capstone</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    h1 {
        color: #333;
        margin-bottom: 20px;
    }

    .video-container {
	width = 100vw;
	max-width = 1200px;
	margin = 0 auto;
        background-color: #000;
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        line-height: 0; /* 이미지 하단 미세 공백 제거 */
    }

    img {
        width: 90%;
        height: auto;
        border-radius: 4px;
        display: block;
	image-rendering: pixelated;
    }
</style>
</head>
<body>
    <hl>라즈베리파이 카메라 스트리밍</hl>
    <div class="video-container">
      <img src="{{ url_for('video_feed') }}" alt="Streaming Video">
    </div>
</body>
</html>
